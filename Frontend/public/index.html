<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người Dùng</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 40px 20px;
            display: flex; justify-content: center;
        }
        .container {
            background: #ffffff; width: 100%; max-width: 900px; padding: 30px 40px;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2c3e50; margin-bottom: 25px; border-bottom: 3px solid #3498db;
            padding-bottom: 8px; margin-top: 35px;
        }
        h2:first-child { margin-top: 0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 18px; }
        .form-group { margin-bottom: 5px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; }
        input { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.2); }
        
        /* CSS cho ô Tìm kiếm */
        .search-box {
            display: flex; gap: 10px; margin-bottom: 15px; align-items: center; justify-content: space-between;
        }
        .search-box input { width: 75%; }
        .btn-search { background-color: #2ecc71; width: 25%; padding: 12px; }
        .btn-search:hover { background-color: #27ae60; }

        button {
            color: white; border: none; padding: 10px 18px; font-size: 14px;
            font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .btn-submit { background-color: #3498db; padding: 12px 25px; font-size: 15px; }
        .btn-submit:hover { background-color: #2980b9; }
        .btn-edit { background-color: #f1c40f; color: #333; padding: 5px 10px; font-size: 13px; margin-right: 5px; }
        .btn-edit:hover { background-color: #d4ac0d; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; font-size: 13px; }
        .btn-delete:hover { background-color: #c0392b; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; color: white; }

        table { width: 100%; border-collapse: collapse; box-shadow: 0 0 10px rgba(0,0,0,0.02); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: #ffffff; font-weight: 600; font-size: 14px; }
        tr:hover { background-color: #f9f9f9; }

        .pagination { display: flex; justify-content: center; align-items: center; margin-top: 30px; gap: 20px; }
        #pageInfo { font-weight: 700; color: #2c3e50; background-color: #ecf0f1; padding: 8px 16px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Thêm mới người dùng</h2>
        <form id="userForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Tên:</label>
                    <input type="text" id="name" placeholder="Nhập họ và tên..." required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="Nhập địa chỉ email..." required>
                </div>
                <div class="form-group">
                    <label>Tuổi:</label>
                    <input type="number" id="age" placeholder="Nhập số tuổi..." min="1" required>
                </div>
                <div class="form-group">
                    <label>Địa chỉ:</label>
                    <input type="text" id="address" placeholder="Nhập địa chỉ..." required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Thêm mới</button>
        </form>

        <h2>Danh sách người dùng</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo Tên hoặc Email..." onkeyup="handleEnter(event)">
            <button class="btn-search" onclick="searchUsers()">Tìm kiếm</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="8%">STT</th>
                    <th width="22%">Tên</th>
                    <th width="10%">Tuổi</th>
                    <th width="22%">Địa chỉ</th>
                    <th width="23%">Email</th>
                    <th width="15%">Thao tác</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                </tbody>
        </table>

        <div class="pagination">
            <button id="btnPrev" onclick="changePage(-1)">Trang trước</button>
            <span id="pageInfo">Trang 1</span>
            <button id="btnNext" onclick="changePage(1)">Trang tiếp</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://my-backend.onrender.com/api/users';
        let currentPage = 1;
        const limit = 5;

        // Tải dữ liệu hiển thị lên bảng (có kèm tham số tìm kiếm)
        async function loadUsers(page) {
            try {
                const searchKeyword = document.getElementById('searchInput').value;
                const response = await fetch(`${API_URL}?page=${page}&limit=${limit}&search=${encodeURIComponent(searchKeyword)}`);
                if (!response.ok) throw new Error("Lỗi mạng");
                
                const data = await response.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                if (data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Không tìm thấy người dùng nào!</td></tr>';
                } else {
                    data.users.forEach((user, index) => {
                        const tr = document.createElement('tr');
                        const stt = (data.page - 1) * data.limit + index + 1;
                        tr.innerHTML = `
                            <td><strong>${stt}</strong></td>
                            <td>${user.name}</td>
                            <td>${user.age || ''}</td>
                            <td>${user.address || ''}</td>
                            <td>${user.email}</td>
                            <td>
                                <button class="btn-edit" onclick="editUser('${user._id}', '${user.name}', ${user.age}, '${user.address}', '${user.email}')">Sửa</button>
                                <button class="btn-delete" onclick="deleteUser('${user._id}')">Xóa</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                document.getElementById('pageInfo').innerText = `Trang ${data.page}`;
                document.getElementById('btnPrev').disabled = data.page === 1;
                document.getElementById('btnNext').disabled = (data.page * limit) >= data.total;

            } catch (error) {
                console.error("Lỗi tải danh sách:", error);
            }
        }

        // Xử lý khi nhấn nút Tìm kiếm
        function searchUsers() {
            currentPage = 1; // Reset về trang 1 khi tìm kiếm mới
            loadUsers(currentPage);
        }

        // Cho phép ấn phím Enter trong ô input để tìm kiếm luôn
        function handleEnter(event) {
            if (event.key === 'Enter') {
                searchUsers();
            }
        }

        // Chuyển trang
        function changePage(step) {
            currentPage += step;
            loadUsers(currentPage);
        }

        // Xử lý Thêm mới
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const age = document.getElementById('age').value;
            const address = document.getElementById('address').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, age, address })
                });

                const result = await response.json();
                if (!response.ok) {
                    alert(result.message);
                } else {
                    alert("Thêm thành công!");
                    document.getElementById('userForm').reset();
                    loadUsers(currentPage);
                }
            } catch (error) {
                alert("Không kết nối được Cơ sở dữ liệu");
            }
        });

        // Xử lý Sửa
        async function editUser(id, oldName, oldAge, oldAddress, oldEmail) {
            const newName = prompt("Nhập tên mới:", oldName);
            if (newName === null) return;
            const newAge = prompt("Nhập tuổi mới:", oldAge);
            const newAddress = prompt("Nhập địa chỉ mới:", oldAddress);

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName, age: newAge, address: newAddress })
                });

                if (!response.ok) {
                    const result = await response.json();
                    alert(result.message);
                } else {
                    alert("Sửa thành công!");
                    loadUsers(currentPage);
                }
            } catch (error) {
                alert("Không kết nối được Cơ sở dữ liệu");
            }
        }

        // Xử lý Xóa
        async function deleteUser(id) {
            if (!confirm("Bạn có chắc chắn muốn xóa người dùng này?")) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    alert("Xóa thất bại");
                } else {
                    alert("Xóa thành công!");
                    loadUsers(currentPage);
                }
            } catch (error) {
                alert("Không kết nối được Cơ sở dữ liệu");
            }
        }

        // Chạy lần đầu tiên
        loadUsers(currentPage);
    </script>
</body>
</html>
